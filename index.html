<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ShaadiOS — Wedding Agency Operating System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#C2185B; --primary-soft:#FCE4EC; --primary-deep:#8E0E3E;
  --accent:#F59E0B; --accent-soft:#FEF3C7; --accent-deep:#B45309;
  --plum:#4A154B; --teal:#0D9488; --teal-soft:#CCFBF1;
  --violet:#7C3AED; --violet-soft:#EDE9FE;
  --success:#15803D; --success-soft:#DCFCE7;
  --warn:#B45309; --warn-soft:#FEF3C7;
  --danger:#B91C1C; --danger-soft:#FEE2E2;
  --bg:#FFF7F2; --surface:#FFFFFF; --surface2:#FDF0EA;
  --text:#2D1126; --text2:#7A5C71; --line:#F3DCE6;
  --shadow:0 2px 12px rgba(194,24,91,.08);
  --shadow-lg:0 8px 28px rgba(74,21,75,.16);
  --r:16px; --r-sm:12px;
  --grad:linear-gradient(135deg,#C2185B 0%,#E91E63 55%,#F59E0B 130%);
  --grad-plum:linear-gradient(135deg,#4A154B,#8E0E3E);
}
[data-theme="dark"]{
  --primary:#F472A6; --primary-soft:#3D1430; --primary-deep:#F9A8C9;
  --accent:#FBBF24; --accent-soft:#3A2A08; --accent-deep:#FCD34D;
  --teal:#2DD4BF; --teal-soft:#0F2E2B; --violet:#A78BFA; --violet-soft:#271C44;
  --success:#4ADE80; --success-soft:#10331C;
  --warn:#FBBF24; --warn-soft:#3A2A08;
  --danger:#F87171; --danger-soft:#3B1212;
  --bg:#170B19; --surface:#241226; --surface2:#2E1830;
  --text:#FBEFF5; --text2:#C49BB4; --line:#3C2240;
  --shadow:0 2px 12px rgba(0,0,0,.35); --shadow-lg:0 8px 28px rgba(0,0,0,.5);
  --grad:linear-gradient(135deg,#9D1750 0%,#C2185B 55%,#D97706 130%);
  --grad-plum:linear-gradient(135deg,#3A1140,#6E0B30);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;transition:background .25s,color .25s}
.phone{max-width:430px;margin:0 auto;min-height:100dvh;background:var(--bg);position:relative;box-shadow:0 0 60px rgba(0,0,0,.12)}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;touch-action:manipulation}
svg{flex-shrink:0}
.serif{font-family:'Playfair Display',serif}
.appbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:12px;padding:14px 16px;background:color-mix(in srgb,var(--bg) 86%,transparent);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.appbar .logo{width:38px;height:38px;border-radius:12px;background:var(--grad);display:grid;place-items:center;color:#fff;overflow:hidden;cursor:pointer;border:none;padding:0}
.appbar .logo img{width:100%;height:100%;object-fit:cover}
.appbar h1{font-size:17px;font-weight:800;letter-spacing:-.2px}
.appbar .sub{font-size:11.5px;color:var(--text2);font-weight:500}
.appbar .spacer{flex:1}
.iconbtn{width:42px;height:42px;border-radius:13px;display:grid;place-items:center;background:var(--surface);border:1px solid var(--line);color:var(--text2);position:relative;transition:transform .15s}
.iconbtn:active{transform:scale(.93)}
.iconbtn .dot{position:absolute;top:9px;right:10px;width:8px;height:8px;border-radius:50%;background:var(--danger);border:2px solid var(--surface)}
.screen{padding:16px 16px 110px;animation:fadeUp .25s ease-out}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
.bottomnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;display:flex;background:color-mix(in srgb,var(--surface) 92%,transparent);backdrop-filter:blur(14px);border-top:1px solid var(--line);padding:8px 6px calc(10px + env(safe-area-inset-bottom));z-index:60}
.bottomnav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10.5px;font-weight:600;color:var(--text2);padding:6px 0;border-radius:12px;min-height:48px}
.bottomnav button.on{color:var(--primary)}
.bottomnav button.on .navico{background:var(--primary-soft)}
.navico{width:40px;height:26px;border-radius:13px;display:grid;place-items:center;transition:background .2s}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--shadow)}
.row{display:flex;align-items:center;gap:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.sectionhead{display:flex;align-items:center;justify-content:space-between;margin:22px 0 12px}
.sectionhead h2{font-size:15px;font-weight:800;letter-spacing:-.2px}
.sectionhead .link,.link{font-size:12.5px;font-weight:700;color:var(--primary);background:none;border:none;cursor:pointer}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px;border:none}
.chip.pink{background:var(--primary-soft);color:var(--primary)}
.chip.amber{background:var(--warn-soft);color:var(--warn)}
.chip.green{background:var(--success-soft);color:var(--success)}
.chip.red{background:var(--danger-soft);color:var(--danger)}
.chip.teal{background:var(--teal-soft);color:var(--teal)}
.chip.violet{background:var(--violet-soft);color:var(--violet)}
.avatar{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;font-weight:800;font-size:13px;color:#fff;flex-shrink:0}
.bar{height:7px;border-radius:99px;background:var(--surface2);overflow:hidden}
.bar i{display:block;height:100%;border-radius:99px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;min-height:48px;border-radius:14px;font-weight:700;font-size:14.5px;transition:transform .15s}
.btn:active{transform:scale(.97)}
.btn.primary{background:var(--grad);color:#fff;box-shadow:0 6px 18px rgba(194,24,91,.32)}
.btn.ghost{background:var(--surface);border:1.5px solid var(--line);color:var(--text)}
.listitem{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--line)}
.listitem:last-child{border-bottom:none}
.muted{color:var(--text2);font-size:12.5px}
.amount{font-variant-numeric:tabular-nums}
.h-scroll{display:flex;gap:12px;overflow-x:auto;scrollbar-width:none;padding:2px;margin:0 -16px;padding-left:16px;padding-right:16px}
.h-scroll::-webkit-scrollbar{display:none}
.hero{background:var(--grad);border-radius:20px;padding:20px;color:#fff;box-shadow:var(--shadow-lg);position:relative;overflow:hidden}
.hero::after{content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.12)}
.hero .big{font-size:30px;font-weight:800;letter-spacing:-.5px}
.statmini{background:rgba(255,255,255,.16);border-radius:13px;padding:10px 12px}
.statmini b{font-size:15.5px}
.statmini span{font-size:10.5px;opacity:.85;display:block}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px;box-shadow:var(--shadow)}
.kpi .ic{width:36px;height:36px;border-radius:11px;display:grid;place-items:center;margin-bottom:10px}
.kpi b{font-size:19px;letter-spacing:-.3px;display:block}
.kpi span{font-size:11.5px;color:var(--text2);font-weight:600}
.tabs{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;margin-bottom:16px}
.tabs::-webkit-scrollbar{display:none}
.tabs button{white-space:nowrap;padding:9px 16px;border-radius:99px;font-size:13px;font-weight:700;background:var(--surface);border:1.5px solid var(--line);color:var(--text2);min-height:40px}
.tabs button.on{background:var(--plum);border-color:var(--plum);color:#fff}
[data-theme="dark"] .tabs button.on{background:var(--primary-soft);border-color:var(--primary);color:var(--primary)}
.pipe{position:relative;padding-left:30px}
.pipe::before{content:"";position:absolute;left:10px;top:8px;bottom:8px;width:2.5px;border-radius:2px;background:var(--line)}
.pipestep{position:relative;padding:0 0 18px}
.pipestep:last-child{padding-bottom:0}
.pipestep .node{position:absolute;left:-27px;top:3px;width:17px;height:17px;border-radius:50%;border:3px solid var(--line);background:var(--surface)}
.pipestep.done .node{background:var(--success);border-color:var(--success)}
.pipestep.now .node{background:var(--accent);border-color:var(--accent);box-shadow:0 0 0 5px var(--accent-soft)}
.pipestep b{font-size:13.5px;display:block}
.pipestep small{font-size:11.5px;color:var(--text2)}
.kanban{display:flex;gap:12px;overflow-x:auto;margin:0 -16px;padding:4px 16px 12px;scrollbar-width:none}
.kanban::-webkit-scrollbar{display:none}
.kcol{min-width:240px;background:var(--surface2);border-radius:var(--r);padding:12px;flex-shrink:0}
.kcol h3{font-size:12.5px;font-weight:800;display:flex;justify-content:space-between;margin-bottom:10px;text-transform:uppercase;letter-spacing:.4px}
.kcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);padding:12px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer}
.kcard b{font-size:13.5px;display:block;margin-bottom:5px}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;text-align:center}
.cal .dow{font-size:10.5px;font-weight:800;color:var(--text2);padding:6px 0;text-transform:uppercase}
.cal .day{aspect-ratio:1;border-radius:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;font-weight:600;position:relative;background:var(--surface);border:1px solid var(--line);cursor:pointer}
.cal .day.dim{opacity:.32;background:transparent;border-color:transparent;pointer-events:none}
.cal .day.ev{border-color:var(--primary)}
.cal .day.ev::after{content:"";width:5px;height:5px;border-radius:50%;background:var(--primary);margin-top:2px}
.cal .day.today{background:var(--grad);color:#fff;border:none}
.cal .day.sel{outline:2.5px solid var(--accent)}
.scrim{position:fixed;inset:0;background:rgba(20,5,18,.55);z-index:90;opacity:0;pointer-events:none;transition:opacity .25s}
.scrim.show{opacity:1;pointer-events:auto}
.sheet{position:fixed;bottom:0;left:50%;transform:translate(-50%,105%);width:100%;max-width:430px;background:var(--surface);border-radius:24px 24px 0 0;padding:10px 20px calc(26px + env(safe-area-inset-bottom));z-index:95;transition:transform .3s cubic-bezier(.2,.9,.3,1);max-height:84dvh;overflow-y:auto}
.sheet.show{transform:translate(-50%,0)}
.sheet .grab{width:42px;height:5px;border-radius:99px;background:var(--line);margin:6px auto 16px}
.sheet h2{font-size:17px;font-weight:800;margin-bottom:14px}
.moreitem{display:flex;align-items:center;gap:14px;width:100%;padding:13px 6px;border-radius:14px;font-weight:700;font-size:14.5px;text-align:left}
.moreitem:active{background:var(--surface2)}
.moreitem .mic{width:42px;height:42px;border-radius:13px;display:grid;place-items:center}
.toast{position:fixed;bottom:96px;left:50%;transform:translate(-50%,20px);background:var(--plum);color:#fff;padding:12px 18px;border-radius:14px;font-size:13.5px;font-weight:600;z-index:120;opacity:0;pointer-events:none;transition:.3s;box-shadow:var(--shadow-lg);max-width:90%;text-align:center}
[data-theme="dark"] .toast{background:#EDD8E6;color:#2D1126}
.toast.show{opacity:1;transform:translate(-50%,0)}
.backrow{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.backrow .title{font-size:18px;font-weight:800;letter-spacing:-.3px}
.fab{position:fixed;right:max(16px,calc(50% - 199px));bottom:96px;width:56px;height:56px;border-radius:18px;background:var(--grad);color:#fff;display:grid;place-items:center;box-shadow:0 8px 22px rgba(194,24,91,.42);z-index:55;transition:transform .15s}
.fab:active{transform:scale(.92)}
.searchbox{display:flex;align-items:center;gap:10px;background:var(--surface);border:1.5px solid var(--line);border-radius:14px;padding:4px 14px;margin-bottom:14px;color:var(--text2)}
.searchbox input{border:none;background:none;flex:1;min-height:44px;font:inherit;font-size:14px;color:var(--text);outline:none}
.ai{background:linear-gradient(135deg,var(--violet-soft),var(--primary-soft));border:1px solid var(--line);border-radius:var(--r);padding:14px}
.ai .tag{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:800;color:var(--violet);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.fld{margin-bottom:13px}
.fld label{font-size:12.5px;font-weight:700;display:block;margin-bottom:6px}
.fld input,.fld select{width:100%;min-height:48px;border:1.5px solid var(--line);border-radius:13px;background:var(--surface2);padding:10px 14px;font:inherit;color:var(--text);font-size:15px}
.fld input:focus,.fld select:focus{outline:2px solid var(--primary);border-color:var(--primary)}
.fld .err{color:var(--danger);font-size:12px;font-weight:600;margin-top:5px;display:none}
.unread{background:var(--primary-soft)}
.listitem.unread{padding-left:10px;border-radius:12px;margin:2px -10px}

/* ---------- Animations ---------- */
@keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes growBar{from{width:0}}
@keyframes pulseLive{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.4)}50%{box-shadow:0 0 0 8px rgba(220,38,38,0)}}
@keyframes popIn{from{opacity:0;transform:scale(.94) translateY(8px)}}
@keyframes breathe{0%,100%{box-shadow:0 8px 22px rgba(194,24,91,.42)}50%{box-shadow:0 12px 32px rgba(194,24,91,.62)}}
@keyframes floaty{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-16px) rotate(6deg)}}
.screen>*{animation:fadeUp .45s both}
.screen>*:nth-child(2){animation-delay:.05s}
.screen>*:nth-child(3){animation-delay:.1s}
.screen>*:nth-child(4){animation-delay:.15s}
.screen>*:nth-child(5){animation-delay:.2s}
.screen>*:nth-child(6){animation-delay:.25s}
.screen>*:nth-child(7){animation-delay:.3s}
.screen>*:nth-child(8){animation-delay:.34s}
.screen>*:nth-child(9){animation-delay:.38s}
.screen>*:nth-child(n+10){animation-delay:.42s}
.hero{animation:fadeUp .45s both,gradShift 9s ease-in-out infinite;background-size:180% 180%}
.bar i{animation:growBar .9s cubic-bezier(.2,.8,.3,1) both}
.chip.live{animation:pulseLive 1.8s infinite}
.fab{animation:breathe 3.2s ease-in-out infinite}
.kcard{animation:popIn .3s both}
.cal .day{animation:popIn .3s both}
.kpi:active,.card[role="button"]:active{transform:scale(.98)}
.kpi,.card{transition:transform .15s,box-shadow .2s}
.iconbtn,.chip{transition:transform .15s}
.chip:active{transform:scale(.9)}
.login-blob{position:absolute;border-radius:50%;opacity:.6;animation:floaty 6.5s ease-in-out infinite;pointer-events:none}

/* ---------- Glassmorphism ---------- */
.phone{overflow:clip}
.orb{position:absolute;border-radius:50%;filter:blur(48px);opacity:.34;z-index:0;pointer-events:none;animation:orbFloat 17s ease-in-out infinite}
[data-theme="dark"] .orb{opacity:.22}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(28px,-36px) scale(1.1)}66%{transform:translate(-22px,24px) scale(.92)}}
.screen{position:relative;z-index:1}
.card,.kpi{background:color-mix(in srgb,var(--surface) 72%,transparent);backdrop-filter:blur(16px) saturate(1.35);-webkit-backdrop-filter:blur(16px) saturate(1.35);border:1px solid color-mix(in srgb,var(--line) 75%,transparent)}
.kcol{background:color-mix(in srgb,var(--surface2) 60%,transparent);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.searchbox,.iconbtn,.tabs button{background:color-mix(in srgb,var(--surface) 62%,transparent);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.appbar{background:color-mix(in srgb,var(--bg) 58%,transparent);backdrop-filter:blur(22px) saturate(1.5);-webkit-backdrop-filter:blur(22px) saturate(1.5)}
.bottomnav{background:color-mix(in srgb,var(--surface) 66%,transparent);backdrop-filter:blur(24px) saturate(1.5);-webkit-backdrop-filter:blur(24px) saturate(1.5)}
.sheet{background:color-mix(in srgb,var(--surface) 80%,transparent);backdrop-filter:blur(26px) saturate(1.5);-webkit-backdrop-filter:blur(26px) saturate(1.5);transition:transform .5s cubic-bezier(.32,1.25,.5,1)}
.fld input,.fld select{background:color-mix(in srgb,var(--surface2) 70%,transparent)}
.hero{box-shadow:var(--shadow-lg),inset 0 1px 0 rgba(255,255,255,.25)}
.hero::after{animation:floaty 7.5s ease-in-out infinite}
.hero::before{animation:floaty 9s ease-in-out infinite reverse}

/* ---------- Extra motion ---------- */
@keyframes navPop{0%{transform:scale(.6)}55%{transform:scale(1.18)}100%{transform:scale(1)}}
.bottomnav button.on .navico{animation:navPop .4s cubic-bezier(.34,1.56,.64,1)}
.pipestep.now .node{animation:pulseLive 2s infinite}
.iconbtn .dot{animation:pulseLive 2s infinite}
@media (hover:hover){
 .card:hover,.kpi:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
 .btn:hover{transform:translateY(-1px)}
 .moreitem:hover{background:var(--surface2)}
}
.toast{transition:opacity .35s,transform .45s cubic-bezier(.34,1.56,.64,1)}
.avatar{transition:transform .2s}
.listitem:active .avatar{transform:scale(1.12)}
@keyframes spinSlow{to{transform:rotate(360deg)}}
.appbar .logo:hover{animation:spinSlow 4s linear infinite}
/* ---------- Micro-animations ---------- */
@keyframes heartbeat{0%,100%{transform:scale(1)}14%{transform:scale(1.18)}28%{transform:scale(1)}42%{transform:scale(1.14)}56%{transform:scale(1)}}
.hbeat{animation:heartbeat 1.6s ease-in-out infinite;display:grid;place-items:center}
@keyframes bellswing{0%,55%,100%{transform:rotate(0)}10%{transform:rotate(16deg)}20%{transform:rotate(-13deg)}30%{transform:rotate(9deg)}40%{transform:rotate(-6deg)}48%{transform:rotate(3deg)}}
#bellBtn.ring svg{animation:bellswing 2.4s ease-in-out infinite;transform-origin:top center}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(.4) rotate(0deg)}50%{opacity:.95;transform:scale(1.2) rotate(45deg)}}
.hero .spark{position:absolute;color:#fff;opacity:0;animation:twinkle 3s ease-in-out infinite;font-size:13px;pointer-events:none;z-index:1}
@keyframes floatUp{0%{transform:translateY(0) scale(.7);opacity:0}14%{opacity:.85}100%{transform:translateY(-140px) scale(1.2);opacity:0}}
.fheart{position:absolute;bottom:-8px;font-size:13px;animation:floatUp 5.5s linear infinite;pointer-events:none;z-index:1}
@keyframes camflash{0%,90%,100%{opacity:1}94%{opacity:.2}}
.blink{animation:camflash 3.2s infinite}
@keyframes wiggle{0%,84%,100%{transform:rotate(0)}88%{transform:rotate(22deg)}92%{transform:rotate(-16deg)}96%{transform:rotate(9deg)}}
.fab svg{animation:wiggle 5.5s ease-in-out infinite}
@keyframes todayGlow{0%,100%{box-shadow:0 0 0 0 rgba(194,24,91,.5)}50%{box-shadow:0 0 0 8px rgba(194,24,91,0)}}
.cal .day.today{animation:popIn .3s both,todayGlow 2.4s ease-in-out infinite}
.cfp{position:fixed;width:9px;height:9px;border-radius:2px;z-index:300;pointer-events:none;animation:cf .95s ease-out forwards}
@keyframes cf{from{transform:translate(0,0) rotate(0deg);opacity:1}to{transform:translate(var(--dx),var(--dy)) rotate(560deg);opacity:0}}
@keyframes flyAway{18%{transform:translateX(-16px) rotate(-2deg);opacity:1}100%{transform:translateX(135%) rotate(7deg);opacity:0}}
@keyframes readPulse{0%{background:var(--success-soft)}100%{background:transparent}}
.avopt{width:44px;height:44px;border-radius:50%;font-size:21px;background:var(--surface2);border:2px solid transparent;display:grid;place-items:center;transition:transform .15s,border-color .15s}
.avopt.sel{border-color:var(--primary);transform:scale(1.12)}
.avopt:active{transform:scale(.9)}
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
<symbol id="i-home" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></symbol>

  const a=S.agency||{};if(!a.supabaseUrl||!a.supabaseKey)return;
  fetch(a.supabaseUrl+'/rest/v1/shaadios',{
    method:'POST',
    headers:{'apikey':a.supabaseKey,'Authorization':'Bearer '+a.supabaseKey,

    body:JSON.stringify({id:'main',payload:JSON.stringify(S),updated_at:new Date().toISOString()})
  }).catch(()=>{});}
async function loadFromSupabase(notify){
  const a=S.agency||{};if(!a.supabaseUrl||!a.supabaseKey)return;
  if(notify)toast('☁️ Pulling latest data…');
  try{
    const r=await fetch(a.supabaseUrl+'/rest/v1/shaadios?id=eq.main&select=payload',{
      headers:{'apikey':a.supabaseKey,'Authorization':'Bearer '+a.supabaseKey}});
    const rows=await r.json();
    if(rows&&rows.length&&rows[0].payload){
      const remote=JSON.parse(rows[0].payload);
      const sess=sessionId;S=remote;sessionId=sess;
      try{localStorage.setItem(KEY,JSON.stringify(S))}catch(e){}
      applyTheme();render();
      if(notify)toast('☁️ Data synced from cloud ✓');}
  }catch(e){if(notify)toast('☁️ Cloud sync failed — check credentials');}}
function syncToSheets(notify){
  try{
    const url=(S.agency&&S.agency.sheetsUrl)||'';if(!url)return;
    const rows=S.projects.map((p,i)=>{
      const rec=p.payments.filter(x=>x.paid).reduce((a,x)=>a+x.amount,0);
      const pend=p.payments.filter(x=>!x.paid).reduce((a,x)=>a+x.amount,0);
      const tok=p.payments.length?p.payments[0].amount:0;
      const who=p.team.map(x=>x.name).join(', ')||'—';
      const hasVideo=p.team.some(x=>/(cinema|video|film|drone)/i.test(x.role));
      const hasPhoto=p.team.some(x=>/(photo)/i.test(x.role));
      const svc=hasPhoto&&hasVideo?'Photo + Video':hasVideo?'Video Only':hasPhoto?'Photo Only':'Wedding Package';
      const evCount=p.events?p.events.length:1;
      const invStatus=pend===0?'Fully Paid':rec>0?'Partial':'Unpaid';
      return [i+1,p.dates,p.bride+' & '+p.groom,svc,evCount+' day'+(evCount>1?'s':''),
        (p.venue||p.city)+', '+p.city,who,tok,p.pkg,pend,p.status,invStatus];
    });
    const payload=encodeURIComponent(JSON.stringify({agency:S.agency.name,rows}));
    if(notify)toast('Syncing to Google Sheets…');
    fetch(url+'?data='+payload)
      .then(r=>r.text())
      .then(t=>{if(notify)toast('✅ Sheet updated — '+rows.length+' booking'+(rows.length!==1?'s':'')+' synced');})
      .catch(()=>{if(notify)toast('❌ Sync failed — check Script URL in Settings');});
  }catch(e){if(notify)toast('❌ Sync error');}
}

calendar(){
  const evmap={};S.projects.forEach(p=>p.events.forEach(e=>{(evmap[e.date]=evmap[e.date]||[]).push({proj:couple(p),pid:p.id,name:e.name,venue:e.venue,city:p.city})}));
  const first=new Date(calY,calM,1);const startDow=(first.getDay()+6)%7;const dim=new Date(calY,calM+1,0).getDate();const prevDim=new Date(calY,calM,0).getDate();
  const mn=first.toLocaleDateString('en-IN',{month:'long',year:'numeric'});const t=todayISO();
  let cells='';
  for(let i=0;i<startDow;i++)cells+=`<span class="day dim">${prevDim-startDow+1+i}</span>`;
  for(let d=1;d<=dim;d++){const iso=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    cells+=`<span class="day ${evmap[iso]?'ev':''} ${iso===t?'today':''} ${iso===selDay?'sel':''}" onclick="selDay='${iso}';render()" role="button">${d}</span>`}
  const rem=(7-(startDow+dim)%7)%7;for(let i=1;i<=rem;i++)cells+=`<span class="day dim">${i}</span>`;
  const sel=selDay&&evmap[selDay]?evmap[selDay]:null;
  const upcoming=Object.keys(evmap).filter(d=>d>=t).sort().slice(0,4);
  return `
  <div class="backrow"><span class="title">Calendar</span><div style="flex:1"></div>
    <button class="iconbtn" aria-label="Previous month" onclick="calM--;if(calM<0){calM=11;calY--};selDay=null;render()">${ico('i-back')}</button>
    <span class="chip pink">${mn}</span>
    <button class="iconbtn" aria-label="Next month" style="transform:scaleX(-1)" onclick="calM++;if(calM>11){calM=0;calY++};selDay=null;render()">${ico('i-back')}</button></div>
  <div class="card"><div class="cal">
    ${['M','T','W','T','F','S','S'].map(d=>`<span class="dow">${d}</span>`).join('')}${cells}</div></div>
  ${sel?`<div class="sectionhead"><h2>${niceDate(selDay)}</h2></div>${sel.map(e=>`
    <div class="card" style="margin-bottom:10px;border-left:4px solid var(--primary);cursor:pointer" onclick="openProject('${e.pid}','overview')">
      <b style="font-size:14px">${esc(e.proj)} — ${esc(e.name)}</b><div class="muted" style="margin-top:4px">📍 ${esc(e.venue)}, ${esc(e.city)}</div></div>`).join('')}`:''}
  <div class="sectionhead"><h2>Upcoming Event Days</h2></div>
  ${upcoming.length?upcoming.map(d=>evmap[d].map(e=>`
   <div class="card" style="margin-bottom:10px;border-left:4px solid ${d===t?'var(--danger)':'var(--primary)'};cursor:pointer" onclick="openProject('${e.pid}','overview')">
     <div class="row" style="justify-content:space-between"><b style="font-size:14px">${esc(e.proj)} — ${esc(e.name)}</b><span class="chip ${d===t?'red':'pink'}">${d===t?'● Today':niceDate(d)}</span></div>
     <div class="muted" style="margin-top:5px">📍 ${esc(e.venue)}, ${esc(e.city)}</div></div>`).join('')).join(''):'<p class="muted">No upcoming events.</p>'}`;
},

reports(){
  const projects=S.projects;

  const avgProfit=projects.length?projects.reduce((a,p)=>a+profit(p),0)/projects.length:0;
  const cats={};projects.forEach(p=>p.expenses.forEach(e=>cats[e.cat]=(cats[e.cat]||0)+e.amount));
  const catList=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  const maxCat=catList.length?catList[0][1]:1;
  const overdueDlv=projects.reduce((a,p)=>a+p.deliverables.filter(d=>d.status==='In progress').length,0);
  const hist=S.revHist;const maxV=Math.max(...hist.map(h=>h.v));
  const busy=S.members.length-S.members.filter(m=>memberStatus(m).txt==='Free').length;
  const colors=['var(--violet)','var(--accent)','var(--teal)','var(--primary)'];

    <div class="kpi"><b>${Math.round(busy/S.members.length*100)}%</b><span>Team busy today</span></div>
    <div class="kpi"><b class="amount">${fmt(totRec)}</b><span>Collected to date</span></div>

  <div class="card" style="padding:6px 16px;margin-bottom:14px">
   ${catList.length?catList.map((c,i)=>`<div class="listitem"><div style="flex:1"><b style="font-size:13.5px">${c[0]}</b>
     <div class="bar" style="margin-top:6px"><i style="width:${Math.round(c[1]/maxCat*100)}%;background:${colors[i%4]}"></i></div></div>
     <b class="amount" style="margin-left:10px">${fmt(c[1])}</b></div>`).join(''):'<p class="muted" style="padding:12px 0">No expenses yet.</p>'}
  </div>
  <div class="row" style="gap:10px">
    <button class="btn ghost" onclick="exportCSV()">${ico('i-doc',16)} Export Excel (CSV)</button>

function saveEditPayment(pid,i){const x=S.projects.find(z=>z.id===pid).payments[i];

function formDeliverable(pid){sheetForm(`<h2>Add Deliverable</h2>

function saveDeliverable(pid){const n=$('e_dn').value.trim();if(!n){$('e_derr').style.display='block';return}

function delDlv(pid,i){if(!confirm('Remove this deliverable?'))return;S.projects.find(z=>z.id===pid).deliverables.splice(i,1);save();render()}
function formMember(i){const m=i>=0?S.members[i]:{name:'',role:'Photographer',exp:'',city:'',phone:''};sheetForm(`<h2>${i>=0?'Edit':'Add'} Team Member</h2>
  <div class="fld"><label>Name *</label><input id="m_n" value="${esc(m.name)}"><div class="err" id="m_err">Name required.</div></div>
  <div class="fld"><label>Role</label><select id="m_r">${['Lead Photographer','Photographer','Cinematographer','Editor','Drone Pilot','Project Manager','Assistant'].map(r=>`<option ${m.role===r?'selected':''}>${r}</option>`).join('')}</select></div>
  <div class="fld"><label>Experience</label><input id="m_e" value="${esc(m.exp)}" placeholder="e.g. 4 yrs"></div>
  <div class="fld"><label>City</label><input id="m_c" value="${esc(m.city)}"></div>

    <button class="btn primary" onclick="saveMember(${i})">Save</button>

function saveMember(i){const n=$('m_n').value.trim();if(!n){$('m_err').style.display='block';return}
  const m={name:n,role:$('m_r').value,exp:$('m_e').value||'—',city:$('m_c').value||'—',phone:$('m_p').value.replace(/[^\d]/g,'')||'91'};
  if(i>=0)S.members[i]=m;else S.members.push(m);

function delMember(i){if(!confirm('Remove '+S.members[i].name+' from the team?'))return;S.members.splice(i,1);save();closeSheets();render();toast('Member removed')}
function formFreelancer(id){const f=id?S.freelancers.find(x=>x.id===id):{name:'',role:'2nd Photographer',rate:8000,gear:'',due:0};sheetForm(`<h2>${id?'Edit':'Add'} Freelancer</h2>
  <div class="fld"><label>Name *</label><input id="fl_n" value="${esc(f.name)}"><div class="err" id="fl_err">Name required.</div></div>
  <div class="fld"><label>Skill / role</label><input id="fl_r" value="${esc(f.role)}"></div>
  <div class="fld"><label>Day rate (₹)</label><input id="fl_rt" type="number" inputmode="numeric" value="${f.rate}"></div>
  <div class="fld"><label>Equipment owned</label><input id="fl_g" value="${esc(f.gear)}"></div>
  <div class="fld"><label>Pending payout (₹)</label><input id="fl_d" type="number" inputmode="numeric" value="${f.due}"></div>
  <div class="row" style="gap:10px">
    ${id?`<button class="btn ghost" style="color:var(--danger)" onclick="delFreelancer('${id}')">Delete</button>`:''}
    <button class="btn primary" onclick="saveFreelancer('${id||''}')">Save</button>
  </div>`)}
function saveFreelancer(id){const n=$('fl_n').value.trim();if(!n){$('fl_err').style.display='block';return}
  const data={name:n,role:$('fl_r').value||'Freelancer',rate:+$('fl_rt').value||0,gear:$('fl_g').value||'—',due:+$('fl_d').value||0};
  if(id)Object.assign(S.freelancers.find(x=>x.id===id),data);
  else S.freelancers.push({id:'f'+Date.now(),paid:0,shoots:0,upcoming:0,...data});
  save();closeSheets();render();toast('Freelancer saved ✓')}
function delFreelancer(id){if(!confirm('Delete this freelancer profile?'))return;S.freelancers=S.freelancers.filter(x=>x.id!==id);save();closeSheets();render();toast('Freelancer removed')}
function formEditTask(id){const t=S.tasks.find(x=>x.id===id);sheetForm(`<h2>Edit Task</h2>
  <div class="fld"><label>Task</label><input id="et_t" value="${esc(t.title)}"></div>
  <div class="fld"><label>Owner</label><input id="et_o" value="${esc(t.owner)}"></div>

  </div>`)}
function saveEditTask(id){const t=S.tasks.find(x=>x.id===id);t.title=$('et_t').value||t.title;t.owner=$('et_o').value;t.due=$('et_d').value||t.due;save();closeSheets();render();toast('Task updated ✓')}
function delTask(id){if(!confirm('Delete this task?'))return;S.tasks=S.tasks.filter(z=>z.id!==id);save();closeSheets();render();toast('Task deleted')}
function delUser(id){const x=S.users.find(z=>z.id===id);if(!confirm('Delete user '+x.name+'? They will no longer be able to log in.'))return;
  S.users=S.users.filter(z=>z.id!==id);save();render();toast('User deleted')}
function formUser(id,selfPin){const u=id?S.users.find(x=>x.id===id):{name:'',role:'Photographer',pin:''};pendAv=null;sheetForm(`<h2>${selfPin?'My Profile':(id?'Edit User':'Add User')}</h2>
  ${selfPin?'':`<div class="fld"><label>Name *</label><input id="u_n" value="${esc(u.name)}"></div>
  <div class="fld"><label>Role</label><select id="u_r">${ROLES.map(r=>`<option ${u.role===r?'selected':''}>${r}</option>`).join('')}</select></div>
  <div class="fld"><label>Link to project (Client role only)</label><select id="u_pj"><option value="">—</option>${S.projects.map(p=>`<option value="${p.id}" ${u.projId===p.id?'selected':''}>${couple(p)}</option>`).join('')}</select></div>
  <p class="muted" style="margin:-4px 0 12px">Tip: name a crew login the same as their team-member profile (e.g. “Arjun Rathod”) so they see only their own projects. Client logins open straight into their wedding portal.</p>`}
  ${avPicker(u)}
  <div class="fld"><label>${selfPin?'New PIN (leave blank to keep current)':'PIN (4–6 digits) *'}</label><input id="u_p" type="password" inputmode="numeric" maxlength="6"><div class="err" id="u_err">${selfPin?'PIN must be 4–6 digits.':'Name and a 4–6 digit PIN are required.'}</div></div>
  <button class="btn primary" onclick="saveUser('${id||''}',${selfPin?'true':'false'})">Save</button>`)}
function saveUser(id,selfPin){const pin=$('u_p').value.trim();
  if(pin&&!/^\d{4,6}$/.test(pin)){$('u_err').style.display='block';return}
  if(selfPin){const u=cu();if(pin)u.pin=pin;if(pendAv!==null)u.avatar=pendAv===''?null:pendAv;
    save();closeSheets();render();toast('Profile updated ✓');return}
  if(!pin){$('u_err').style.display='block';return}
  const n=$('u_n').value.trim();if(!n){$('u_err').style.display='block';return}
  const pj=$('u_pj')?$('u_pj').value:'';
  if(id){const u=S.users.find(x=>x.id===id);u.name=n;u.role=$('u_r').value;u.pin=pin;u.projId=pj;if(pendAv!==null)u.avatar=pendAv===''?null:pendAv}
  else S.users.push({id:'u'+Date.now(),name:n,role:$('u_r').value,pin,projId:pj,avatar:(pendAv&&pendAv!=='')?pendAv:null});
  save();closeSheets();render();toast('User saved ✓')}

/* ================= SETTINGS / BRAND / INVOICE ================= */
function uploadLogo(input){const f=input.files[0];if(!f)return;
  if(f.size>2000000){toast('Image too large — keep it under 2 MB');input.value='';return}
  const r=new FileReader();r.onload=e=>{S.agency.logo=e.target.result;save();render();toast('Logo updated ✓')};r.readAsDataURL(f)}
function saveSettings(){const g=id=>$(id).value.trim();const a=S.agency;
  a.name=g('s_name')||a.name;a.short=g('s_short')||a.short;a.owner=g('s_owner');a.tagline=g('s_tag');
  a.phone=g('s_phone').replace(/[^\d]/g,'');a.email=g('s_email');a.address=g('s_addr');a.upi=g('s_upi');
  a.sheetsUrl=g('s_sheets');
  a.supabaseUrl=g('s_sburl').replace(/\/$/,'');a.supabaseKey=g('s_sbkey');
  save();render();
  if(a.supabaseUrl&&a.supabaseKey)setTimeout(()=>loadFromSupabase(true),400);
  else toast('Settings saved ✓');}
function backupJSON(){const b=new Blob([JSON.stringify(S,null,1)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='shaadios-backup-'+todayISO()+'.json';a.click();URL.revokeObjectURL(a.href);toast('Backup downloaded ✓')}
function importJSON(input){const f=input.files[0];if(!f)return;const r=new FileReader();
  r.onload=e=>{try{const d=JSON.parse(e.target.result);if(!d.projects||!d.members)throw 0;S=d;if(!S.agency)S.agency=JSON.parse(JSON.stringify(DEFAULT.agency));save();applyTheme();render();toast('Backup restored ✓')}catch(err){toast('Invalid backup file')}};
  r.readAsText(f);input.value=''}
function invoice(pid){const p=S.projects.find(x=>x.id===pid);const a=S.agency;const w=window.open('','_blank');
  const paid=received(p),bal=pendingAmt(p);
  const rows=p.payments.map(x=>`<tr><td>${x.label}</td><td>${x.date}</td><td style="text-align:right">${fmt(x.amount)}</td><td>${x.paid?'✓ Paid':'Due'}</td></tr>`).join('');
  w.document.write(`<html><head><title>Invoice — ${couple(p)}</title><style>body{font-family:Arial;padding:34px;color:#222;max-width:700px;margin:auto}h1{color:#C2185B;margin:6px 0}table{width:100%;border-collapse:collapse;margin-top:14px}td,th{border:1px solid #ddd;padding:8px;font-size:13px}th{background:#FCE4EC;text-align:left}.tot{font-size:15px;font-weight:bold}.muted{color:#777;font-size:12px}</style></head><body>
  ${a.logo?`<img src="${a.logo}" style="width:64px;height:64px;object-fit:cover;border-radius:12px">`:''}
  <h1>${a.name}</h1><p class="muted">${a.address||''} · ${a.email||''} · +${a.phone||''}</p><hr>
  <p><b>INVOICE</b> · ${new Date().toLocaleDateString('en-IN')}<br>Billed to: <b>${p.bride} &amp; ${p.groom}</b> · ${p.city}</p>
  <table><tr><th>Item</th><th>Date</th><th>Amount</th><th>Status</th></tr>
  <tr><td>Wedding package — ${couple(p)} (${p.dates})</td><td></td><td style="text-align:right">${fmt(p.pkg)}</td><td></td></tr>${rows}</table>
  <p class="tot">Received: ${fmt(paid)} &nbsp;·&nbsp; Balance due: ${fmt(bal)}</p>
  ${a.upi?`<p>Pay via UPI: <b>${a.upi}</b></p>`:''}
  <p class="muted">Generated by ShaadiOS for ${a.name}. Thank you for celebrating with us! 💗</p>
  <script>window.print()<\/script></body></html>`);w.document.close()}
applyTheme();render();
if(S.agency&&S.agency.supabaseUrl&&S.agency.supabaseKey)setTimeout(()=>loadFromSupabase(false),800);
